<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas Pertemuan 2 Praktikum</title>
</head>
<body>
    <form action="" method="">
        <div>
            <h1>Formulir Login</h1>
            <label for="">Nama : </label>
            <input type="text" name="username" placeholder="Masukan Nama Anda" value="Nazla">
        </div>

        <label for="">Deskripsi</label>
        <textarea name="Deskripsi" id="" rows="10" cols="40" placeholder="saya adalah..."></textarea>

        <div>
            <label for="Jenis Kelamin">Jenis Kelamin Anda</label>
            <select name="Gemder" id="">
                <option value="L">Laki Laki</option>
                <option value="P" selected>Perempuan</option>
            </select>
        </div>
        
        <div>
            <input type="radio" name="Pil 1" value="1">Pilihan 1
            <input type="radio" name="Pil 2" value="2">Pilihan 2
            <input type="radio" name="Pil 3" value="3">Pilihan 3
            <input type="radio" name="Pil 4" value="4">Pilihan 4
        </div>
        
        <div>
            <input type="checkbox" name="Hobi" value="Nari">Nari
            <input type="checkbox" name="Hobi" value="Nyanyi">Nyanyi
            <input type="checkbox" name="Hobi" value="Melukis">Melukis
            <input type="checkbox" name="Hobi" value="Akting">Akting
        </div>
        
        <div>
            <label for="">Upload</label>
            <input type="file">
        </div>
        <button type="submit">Kirim</button>
        <button type="button" onclick="alert('Halo!')">Klik saya!</button>
    </form>

</body>
</html>
