<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" >
    <title>Document</title>
</head>
<body>
    
    <form>
        <table border="1" cellspacing="0" align="left">
        <tr> 
            <td style=" padding: 5px 20px 20px 20px;">

                <h1>Formulir Data Diri</h1>
                <div>
                    <label for="nama">Nama : </label>
                    <input type="text" name="username">
                </div>

                <div>
                    <label for="email">Email : </label>
                    <input type="text" name="email">
                </div>

                <div>
                    <label for="Jenis Kelamin">Jenis Kelamin : </label>
                    <label><input type="radio" name="gender" value="L">Laki-Laki</label>
                    <label><input type="radio" name="gender" value="P">Perempuan</label> 
                </div>
                
                <div>
                    <label for="hobi">Hobi : </label>
                    <label><input type="checkbox" name="hobi" value="musik">Musik</label>
                    <label><input type="checkbox" name="hobi" value="olahraga">Olahraga</label>
                </div>

                <div>
                    <label for="kota">Pilih Kota : </label>
                    <select name="kota" id="">
                        <option value="jakarta">Jakarta</option>
                        <option value="bandung">Bandung</option>
                        <option value="bogor">Bogor</option>
                        <option value="karawang">Karawang</option>
                        <option value="tasikmalaya">Tasikmalaya</option>
                    </select>
                </div>

                <div>
                    <label for="">Upload Foto : </label>
                    <input type="file">
                </div>

                <button type="submit">Daftar</button>
            </td>
        </tr>
        </table>
    </form>
</body>
</html>
